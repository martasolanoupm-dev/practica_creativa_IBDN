services:
  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=flight_cluster
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe keyspaces' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: apache/kafka:4.0.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "/opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-request && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --replication-factor 1 --partitions 1 --topic flight-delay-ml-response"

  flask:
    build:
      context: .
      dockerfile: Dockerfile.flask
    image: practica-flask:latest
    container_name: flask
    ports:
      - "5001:5001"
    depends_on:
      cassandra:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./:/practica

  spark-master:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: practica-spark:latest
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./:/practica

  spark-worker-1:
    image: practica-spark:latest
    container_name: spark-worker-1
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 4 --memory 8g --webui-port 8081
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    volumes:
      - ./:/practica

  spark-worker-2:
    image: practica-spark:latest
    container_name: spark-worker-2
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --cores 4 --memory 8g --webui-port 8082
    depends_on:
      - spark-master
    ports:
      - "8082:8082"
    volumes:
      - ./:/practica

  predictor:
    image: practica-spark:latest
    container_name: predictor
    depends_on:
      cassandra:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "sleep 30 && /opt/spark/bin/spark-submit --master spark://spark-master:7077 --packages org.apache.spark:spark-sql-kafka-0-10_2.13:4.1.1,com.datastax.oss:java-driver-core:4.17.0 --class es.upm.dit.ging.predictor.MakePrediction /practica/flight_prediction/target/scala-2.13/flight_prediction_2.13-0.1.jar"
    volumes:
      - ./:/practica

  train:
    image: practica-spark:latest
    container_name: train
    profiles:
      - train
    depends_on:
      minio:
        condition: service_started
      spark-master:
        condition: service_started
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "sleep 20 && /opt/spark/bin/spark-submit --master spark://spark-master:7077 /practica/resources/train_spark_mllib_model.py /practica"
    volumes:
      - ./:/practica

volumes:
  minio_data:
  cassandra_data: